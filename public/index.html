<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>MemoryReel</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/styles-v2.css" />
</head>
<body>
  <!-- Landing Screen -->
  <div id="landing-screen" class="screen active">
    <div class="landing-content">
      <div class="brand">
        <h1>MemoryReel</h1>
        <p class="invite-message">Leave a special wish for the happy couple</p>
      </div>
      
      <div class="camera-preview">
        <video id="preview" class="preview" playsinline muted autoplay></video>
        <div class="camera-overlay"></div>
      </div>
      
      <div class="record-container">
        <div class="countdown-ring">
          <svg class="countdown-svg" viewBox="0 0 100 100">
            <circle class="countdown-bg" cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
            <circle id="countdown-progress" class="countdown-progress" cx="50" cy="50" r="46" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" transform="rotate(-90 50 50)" stroke-dasharray="289" stroke-dashoffset="0"/>
          </svg>
          <button id="record-button" class="record-button" type="button">
            <div class="record-button-inner"></div>
          </button>
        </div>
        <p class="record-hint">Touch & hold to record</p>
      </div>
    </div>
  </div>

  <!-- Preview Screen -->
  <div id="preview-screen" class="screen">
    <video id="video-preview" class="video-preview" playsinline></video>
    <div class="preview-overlay">
      <div class="preview-actions">
        <button id="cancel-button" class="action-button cancel" type="button">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
          <span>Cancel</span>
        </button>
        <button id="save-button" class="action-button save" type="button">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          <span>Save</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Upload Status -->
  <div id="upload-status" class="upload-status">
    <div class="status-content">
      <div class="spinner"></div>
      <p id="status-text">Uploading...</p>
    </div>
  </div>

  <script src="/app-v2.js" type="module"></script>
</body>
</html>
